
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Open‑Channel Hydropower Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial, Helvetica, sans-serif;
max-width:900px;
margin:auto;
padding:40px;
background:#ffffff;
line-height:1.6;
}

h1{margin-bottom:10px;}
.subtitle{color:#666;margin-bottom:30px;}

.calculator{
background:#f4f7ff;
padding:25px;
border-radius:10px;
margin-bottom:30px;
}

label{font-weight:bold;}
input{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:15px;
font-size:16px;
}

button{
background:#e91e63;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.results{margin-top:25px;font-size:18px;}
.result{margin-bottom:8px;}
.highlight{font-weight:bold;color:#1b6eea;}

canvas{
margin-top:40px;
border:1px solid #ddd;
border-radius:8px;
}

.note{
margin-top:25px;
font-size:14px;
color:#666;
}
</style>
</head>

<body>

<h1>Hydropower Potential Calculator</h1>
<div class="subtitle">
Interactive calculator based on open‑channel flow energy extraction theory.
</div>

<div class="calculator">

<label>Flow velocity V (m/s)</label>
<input id="velocity" type="number" step="0.1" value="1">

<label>Channel width L (m)</label>
<input id="width" type="number" step="0.1" value="10">

<label>Water depth H (m)</label>
<input id="depth" type="number" step="0.1" value="2">

<button onclick="calculate()">Calculate</button>

<div class="results">
<div id="power" class="result"></div>
<div id="froude" class="result"></div>
<div id="percent" class="result"></div>
</div>

</div>

<canvas id="graph" width="800" height="400"></canvas>

<div class="note">
The theoretical maximum extraction limit occurs near Fr ≈ 0.3094 with η ≈ 34.52%.
</div>

<script>

function calculate(){

let v=parseFloat(document.getElementById("velocity").value);
let w=parseFloat(document.getElementById("width").value);
let d=parseFloat(document.getElementById("depth").value);

let rho=1000;
let g=9.81;

/* Froude number */

let Fr = v / Math.sqrt(g * d);

/* extractable power from theoretical formula */

let power = rho * w * Math.pow(g,1.5) * Math.pow(d,2.5) *
(
    Fr +
    0.5 * Math.pow(Fr,3) -
    1.5 * Math.pow(Fr,5/3)
);

/* total upstream energy */

let total = rho * w * Math.pow(g,1.5) * Math.pow(d,2.5) *
(
    Fr +
    0.5 * Math.pow(Fr,3)
);

/* extraction percentage */

let percent = (power / total) * 100;

let kw=(power/1000).toFixed(2);

document.getElementById("power").innerHTML =
"Extractable power: <span class='highlight'>" + kw + " kW</span>";

document.getElementById("froude").innerHTML =
"Froude number: <span class='highlight'>" + Fr.toFixed(3) + "</span>";

document.getElementById("percent").innerHTML =
"Extraction relative to full flow energy: <span class='highlight'>" + percent.toFixed(2) + " %</span>";

drawGraph(Fr);

}

function drawGraph(currentFr){

let canvas=document.getElementById("graph");
let ctx=canvas.getContext("2d");

ctx.clearRect(0,0,canvas.width,canvas.height);

/* axes */

ctx.beginPath();
ctx.moveTo(50,350);
ctx.lineTo(750,350);
ctx.moveTo(50,350);
ctx.lineTo(50,50);
ctx.stroke();

/* curve approximation */

ctx.beginPath();

for(let i=0;i<=200;i++){

let Fr=i/200;

let eta=34.52*Math.exp(-Math.pow((Fr-0.3094)/0.22,2));

let x=50+Fr*700;
let y=350-eta*6;

if(i===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);

}

ctx.stroke();

/* mark optimal */

let xOpt=50+0.3094*700;
let yOpt=350-34.52*6;

ctx.beginPath();
ctx.arc(xOpt,yOpt,5,0,2*Math.PI);
ctx.fill();

/* mark current */

if(currentFr!==undefined){

let x=50+currentFr*700;
let eta=34.52*Math.exp(-Math.pow((currentFr-0.3094)/0.22,2));
let y=350-eta*6;

ctx.beginPath();
ctx.arc(x,y,6,0,2*Math.PI);
ctx.fill();

}

}

drawGraph();

</script>

</body>
</html>
