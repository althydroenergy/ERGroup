
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Open‑Channel Hydropower Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial, Helvetica, sans-serif;
max-width:900px;
margin:auto;
padding:40px;
background:#ffffff;
line-height:1.6;
}

h1{margin-bottom:10px;}
.subtitle{color:#666;margin-bottom:30px;}

.calculator{
background:#f4f7ff;
padding:25px;
border-radius:10px;
margin-bottom:30px;
}

label{font-weight:bold;}
input{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:15px;
font-size:16px;
}

button{
background:#e91e63;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.results{margin-top:25px;font-size:18px;}
.result{margin-bottom:8px;}
.highlight{font-weight:bold;color:#1b6eea;}

canvas{
margin-top:40px;
border:1px solid #ddd;
border-radius:8px;
}

.note{
margin-top:25px;
font-size:14px;
color:#666;
}
</style>
</head>

<body>

<h1>Hydropower Potential Calculator</h1>
<div class="subtitle">
Interactive calculator based on open‑channel flow energy extraction theory.
</div>

<div class="calculator">

<label>Flow velocity V (m/s)</label>
<input id="velocity" type="number" step="0.1" value="1">

<label>Channel width L (m)</label>
<input id="width" type="number" step="0.1" value="10">

<label>Water depth H (m)</label>
<input id="depth" type="number" step="0.1" value="2">

<button onclick="calculate()">Calculate</button>

<div class="results">
<div id="power" class="result"></div>
<div id="froude" class="result"></div>
<div id="percent" class="result"></div>
<div id="scaled" class="result"></div>
</div>

</div>

<canvas id="graph" width="800" height="400"></canvas>

<div class="note">
The theoretical maximum extraction limit occurs near Fr ≈ 0.3094 with η ≈ 34.52%.
</div>

<script>

function calculate(){

let v=parseFloat(document.getElementById("velocity").value);
let L=parseFloat(document.getElementById("width").value);
let H=parseFloat(document.getElementById("depth").value);

let rho=1000;
let g=9.81;

/* Froude number */

let Fr = v / Math.sqrt(g * H);

/* scale coefficient ρ L g^(3/2) H^(5/2) */

let scale = rho * L * Math.pow(g,1.5) * Math.pow(H,2.5);

/* bracket terms */

let bracket_extract =
    Fr +
    0.5 * Math.pow(Fr,3) -
    1.5 * Math.pow(Fr,5/3);

let bracket_total =
    Fr +
    0.5 * Math.pow(Fr,3);

/* power */

let power = scale * bracket_extract;

/* efficiency relative to full flow */

let percent = (bracket_extract / bracket_total) * 100;

/* dimensionless coefficient */

let scaled = bracket_extract;

let kw=(power/1000).toFixed(2);

document.getElementById("power").innerHTML =
"Extractable power: <span class='highlight'>" + kw + " kW</span>";

document.getElementById("froude").innerHTML =
"Froude number: <span class='highlight'>" + Fr.toFixed(4) + "</span>";

document.getElementById("percent").innerHTML =
"Extraction relative to full flow energy: <span class='highlight'>" + percent.toFixed(2) + " %</span>";

document.getElementById("scaled").innerHTML =
"Dimensionless energy function: <span class='highlight'>" + scaled.toFixed(4) + "</span>";

drawGraph(Fr);

}

function drawGraph(currentFr){

let canvas=document.getElementById("graph");
let ctx=canvas.getContext("2d");

ctx.clearRect(0,0,canvas.width,canvas.height);

/* axes */

ctx.beginPath();
ctx.moveTo(50,350);
ctx.lineTo(750,350);
ctx.moveTo(50,350);
ctx.lineTo(50,50);
ctx.stroke();

ctx.beginPath();

for(let i=0;i<=400;i++){

let Fr=i/400;

let eta=(
Fr + 0.5*Math.pow(Fr,3) - 1.5*Math.pow(Fr,5/3)
) / (
Fr + 0.5*Math.pow(Fr,3)
) * 100;

let x=50+Fr*700;
let y=350-eta*6;

if(i===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);

}

ctx.stroke();

/* optimal point */

let FrOpt=0.3094;
let etaOpt=34.52;

let xOpt=50+FrOpt*700;
let yOpt=350-etaOpt*6;

ctx.beginPath();
ctx.arc(xOpt,yOpt,5,0,2*Math.PI);
ctx.fill();

/* current point */

if(currentFr!==undefined){

let eta=(
currentFr + 0.5*Math.pow(currentFr,3) - 1.5*Math.pow(currentFr,5/3)
) / (
currentFr + 0.5*Math.pow(currentFr,3)
) * 100;

let x=50+currentFr*700;
let y=350-eta*6;

ctx.beginPath();
ctx.arc(x,y,6,0,2*Math.PI);
ctx.fill();

}

}

drawGraph();

</script>

</body>
</html>
